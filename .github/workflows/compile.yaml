name: ESPHome CI Compile

on:
  schedule:
  # each fifth day of month
  - cron: "42 10 5 * *"
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      ESPHOME_VERSION:
        description: 'ESPHome Docker image version'
        required: false
        default: 'latest'

jobs:
  list_yaml_files:
    runs-on: ubuntu-latest
    outputs:
      yaml_files: ${{ steps.set_files.outputs.yaml_list }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: List YAML files
        id: set_files
        run: |
          # Find all YAMLs in repo root (can replace with recursive find later)
          files=$(ls *.yaml | jq -R -s -c 'split("\n")[:-1]')
          echo "yaml_list=$files" >> $GITHUB_OUTPUT

  compile:
    needs: list_yaml_files
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config: ${{fromJson(needs.list_yaml_files.outputs.yaml_files)}}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # --------------------------
      # Determine ESPHome version
      # --------------------------
      - name: Set ESPHome version
        id: set_version
        run: |
          # If triggered by push/PR, default to 'latest'; otherwise use workflow_dispatch input
          if [ -z "${{ github.event.inputs.ESPHOME_VERSION }}" ]; then
            echo "version=latest" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.ESPHOME_VERSION }}" >> $GITHUB_OUTPUT
          fi

      # --------------------------
      # Cache PlatformIO packages
      # --------------------------
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: .platformio
          key: esphome-${{ runner.os }}-${{ steps.set_version.outputs.version }}
          restore-keys: |
            esphome-${{ runner.os }}-

      # --------------------------
      # Cache Docker image
      # --------------------------
      - name: Cache ESPHome Docker image
        uses: ScribeMD/docker-cache@0.5.0
        with:
          key: esphome-${{ steps.set_version.outputs.version }}
          images: esphome/esphome:${{ steps.set_version.outputs.version }}

      - name: Pull ESPHome Docker image
        run: docker pull esphome/esphome:${{ steps.set_version.outputs.version }}

      # --------------------------
      # Prepare secrets.yaml
      # --------------------------
      - name: Prepare secrets.yaml
        run: |
          if [ -n "${{ secrets.SECRETS_YAML }}" ]; then
            echo "${{ secrets.SECRETS_YAML }}" > secrets.yaml
            echo "Using repository secret"
          else
            cp secrets-template.yaml secrets.yaml
            echo "Using template file"
          fi

      # --------------------------
      # Compile
      # --------------------------
      - name: Compile ESPHome firmware
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/config \
            -v ${{ github.workspace }}/.platformio:/cache \
            esphome/esphome:${{ steps.set_version.outputs.version }} \
            compile /config/${{ matrix.config }}
