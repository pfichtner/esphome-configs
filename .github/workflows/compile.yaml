name: ESPHome CI Compile

on:
  schedule:
  # each fifth day of month
  - cron: "42 10 5 * *"
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      ESPHOME_VERSION:
        description: 'ESPHome Docker image version'
        required: false
        default: 'latest'

jobs:
  list_yaml_files:
    runs-on: ubuntu-latest
    outputs:
      yaml_files: ${{ steps.set.outputs.yaml_list }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
  
      - id: changed
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        uses: tj-actions/changed-files@v47.0.4
  
      - id: set
        run: |
          ALL_YAML=$(ls *.yaml 2>/dev/null | jq -R -s -c 'split("\n")[:-1]')
  
          if [[ "${{ github.event_name }}" == "schedule" || \
                "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "yaml_list=$ALL_YAML" >> $GITHUB_OUTPUT
            exit 0
          fi
  
          if [[ "${{ steps.changed.outputs.any_changed }}" != "true" ]]; then
            echo "yaml_list=[]" >> $GITHUB_OUTPUT
            exit 0
          fi
  
          ALL_CHANGED=$(printf '%s\n' "${{ steps.changed.outputs.all_changed_files }}" | jq -R -s -c 'split("\n")[:-1]')
          YAML_CHANGED=$(echo "$ALL_CHANGED" | jq '[.[] | select(test("^[^/]+\\.yaml$"))]')
  
          TOTAL=$(echo "$ALL_CHANGED" | jq 'length')
          YAML_COUNT=$(echo "$YAML_CHANGED" | jq 'length')
  
          if [[ "$TOTAL" -ne "$YAML_COUNT" ]]; then
            echo "yaml_list=$ALL_YAML" >> $GITHUB_OUTPUT
          else
            echo "yaml_list=$YAML_CHANGED" >> $GITHUB_OUTPUT
          fi

  compile:
    needs: list_yaml_files
    if: ${{ needs.list_yaml_files.outputs.yaml_files != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config: ${{fromJson(needs.list_yaml_files.outputs.yaml_files)}}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # --------------------------
      # Determine ESPHome version
      # --------------------------
      - name: Set ESPHome version
        id: set_version
        run: |
          # If triggered by push/PR, default to 'latest'; otherwise use workflow_dispatch input
          if [ -z "${{ github.event.inputs.ESPHOME_VERSION }}" ]; then
            echo "version=latest" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.ESPHOME_VERSION }}" >> $GITHUB_OUTPUT
          fi

      # --------------------------
      # Cache PlatformIO packages
      # --------------------------
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: .platformio
          key: esphome-${{ runner.os }}-${{ steps.set_version.outputs.version }}
          restore-keys: |
            esphome-${{ runner.os }}-

      # --------------------------
      # Cache Docker image
      # --------------------------
      - name: Cache ESPHome Docker image
        uses: ScribeMD/docker-cache@0.5.0
        with:
          key: esphome-${{ steps.set_version.outputs.version }}

      - name: Pull ESPHome Docker image
        run: docker pull esphome/esphome:${{ steps.set_version.outputs.version }}

      # --------------------------
      # Prepare secrets.yaml
      # --------------------------
      - name: Prepare secrets.yaml
        run: |
          if [ -n "${{ secrets.SECRETS_YAML }}" ]; then
            echo "${{ secrets.SECRETS_YAML }}" > secrets.yaml
            echo "Using repository secret"
          else
            cp .secrets-template.yaml secrets.yaml
            echo "Using template file"
          fi

      # --------------------------
      # Compile
      # --------------------------
      - name: Ensure cache dir exists
        run: mkdir -p .platformio
      - name: Compile ESPHome firmware
        run: |
          docker run --rm \
            --user $(id -u):$(id -g) \
            -e HOME=/tmp \
            -e PLATFORMIO_CORE_DIR=/cache \
            -v ${{ github.workspace }}:/config \
            -v ${{ github.workspace }}/.platformio:/cache \
            esphome/esphome:${{ steps.set_version.outputs.version }} \
            compile /config/${{ matrix.config }}
